<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>이월 가계부</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0f1115" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<!-- iOS 홈 화면 앱 -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="이월가계부" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card2: #22262f;
    --line: #2c313c;
    --txt: #e8eaed;
    --sub: #9aa0ac;
    --accent: #4f8cff;
    --good: #37d67a;
    --bad: #ff5c6c;
    --warn: #ffb020;
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg);
    color: var(--txt);
    padding: 16px 14px 60px;
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.4;
  }
  h1 { font-size: 20px; margin: 0; }
  .muted { color: var(--sub); font-size: 13px; }

  /* 상단 고정 헤더 */
  .appbar {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    /* 좌우로 body 패딩만큼 넓혀 전체 폭을 덮음 */
    margin: -16px -14px 0; padding: 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }
  .icon-btn { flex: none; width: 42px; height: 40px; padding: 0; font-size: 18px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    margin-top: 14px;
  }

  /* 월 이동 바 */
  .month-nav { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .mn-label { flex: 1; text-align: center; font-size: 16px; font-weight: 700; }
  .mn-btn {
    flex: none; width: 44px; height: 40px; font-size: 22px; line-height: 1;
    background: var(--card2); color: var(--txt); border: 1px solid var(--line); border-radius: 12px;
  }
  .mn-btn:disabled { opacity: .35; cursor: default; }

  /* 메인 잔액 카드 */
  .hero { text-align: center; padding: 24px 18px; }
  .hero .label { color: var(--sub); font-size: 14px; }
  .hero .balance { font-size: 42px; font-weight: 800; margin: 6px 0 2px; letter-spacing: -1px; }
  .hero .balance.neg { color: var(--bad); }
  .hero .balance.pos { color: var(--good); }
  .hero .sub { font-size: 13px; color: var(--sub); }
  .bar { height: 8px; background: var(--card2); border-radius: 99px; margin: 16px 0 6px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; }

  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 14px; }
  .stat { background: var(--card2); border-radius: 12px; padding: 12px 10px; text-align: center; }
  .stat .k { font-size: 11px; color: var(--sub); }
  .stat .v { font-size: 15px; font-weight: 700; margin-top: 4px; }

  label.field { display: block; font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  input, select, button { font-family: inherit; font-size: 16px; }
  input, select {
    width: 100%; padding: 12px 14px; background: var(--card2); border: 1px solid var(--line);
    color: var(--txt); border-radius: 12px; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  button {
    cursor: pointer; border: none; border-radius: 12px; padding: 13px; font-weight: 700;
    background: var(--accent); color: #fff; transition: filter .15s;
  }
  button:active { filter: brightness(.9); }
  button.ghost { background: var(--card2); color: var(--txt); border: 1px solid var(--line); }
  button.danger { background: transparent; color: var(--bad); border: 1px solid var(--line); }

  .section-title { display: flex; justify-content: space-between; align-items: center; margin: 22px 4px 8px; }
  .section-title h2 { font-size: 15px; margin: 0; }

  .exp { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid var(--line); }
  .exp:last-child { border-bottom: none; }
  .exp .icon { width: 38px; height: 38px; border-radius: 10px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex: none; }
  .exp .info { flex: 1; min-width: 0; }
  .exp .info .m { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exp .info .d { font-size: 12px; color: var(--sub); }
  .exp .amt { font-weight: 700; font-size: 15px; }
  .exp .del { background: none; border: none; color: var(--sub); font-size: 18px; padding: 4px 8px; }
  .day-head { font-size: 12px; color: var(--sub); margin: 16px 4px 2px; font-weight: 700; }
  .empty { text-align: center; color: var(--sub); padding: 30px 10px; font-size: 14px; }

  /* 파이 차트 */
  .pie-wrap { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .pie-svg { flex: none; }
  .pie-seg { transition: opacity .15s; cursor: default; }
  .pie-wrap.dim .pie-seg:not(.hot) { opacity: .3; }
  .pie-center-total { font-size: 15px; font-weight: 800; fill: var(--txt); }
  .pie-center-label { font-size: 9px; fill: var(--sub); }
  .legend { flex: 1; min-width: 180px; display: flex; flex-direction: column; gap: 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 4px; border-radius: 8px; }
  .legend-row .sw { width: 12px; height: 12px; border-radius: 3px; flex: none; }
  .legend-row .nm { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legend-row .vl { font-weight: 700; font-variant-numeric: tabular-nums; }
  .legend-row .pc { color: var(--sub); width: 42px; text-align: right; font-variant-numeric: tabular-nums; }

  /* 접기/펼치기 토글 */
  .list-toggle { background: none; border: none; padding: 0; display: flex; align-items: center; gap: 8px; color: var(--txt); font-weight: 700; cursor: pointer; }
  .list-toggle h2 { font-size: 15px; margin: 0; }
  .list-toggle .caret { font-size: 12px; color: var(--sub); transition: transform .2s; }
  .list-toggle[aria-expanded="false"] .caret { transform: rotate(-90deg); }
  .list-toggle #listCount { font-weight: 400; }

  /* 스크롤 제한 목록 */
  #listCard.scrollable { max-height: 340px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #listCard.collapsed, #pieCard.collapsed { display: none; }

  dialog {
    border: 1px solid var(--line); background: var(--card); color: var(--txt);
    border-radius: var(--radius); padding: 20px; width: 90%; max-width: 400px;
  }
  dialog::backdrop { background: rgba(0,0,0,.6); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .chip { padding: 8px 12px; border-radius: 99px; background: var(--card2); border: 1px solid var(--line); font-size: 14px; cursor: pointer; }
  .chip.on { background: var(--accent); border-color: var(--accent); color:#fff; }
</style>
</head>
<body>

  <!-- 상단 고정 헤더: 타이틀(좌) · 설정(우) -->
  <header class="appbar">
    <h1>💰 이월 가계부</h1>
    <button class="ghost icon-btn" id="settingsBtn" aria-label="설정">⚙</button>
  </header>

  <!-- 월 이동 (전체 뷰가 월 단위로 바뀜) -->
  <div class="month-nav">
    <button class="mn-btn" id="prevMonth" aria-label="이전 달">‹</button>
    <div class="mn-label" id="monthLabel">-</div>
    <button class="mn-btn" id="nextMonth" aria-label="다음 달">›</button>
  </div>

  <div id="installBar" style="display:none; align-items:center; gap:10px; margin-top:12px; padding:12px 14px; background:var(--card2); border:1px solid var(--line); border-radius:12px;">
    <span style="flex:1; font-size:13px;">홈 화면에 앱으로 설치할 수 있어요.</span>
    <button id="installBtn" style="padding:8px 14px; font-size:13px; flex:none;">설치</button>
  </div>

  <!-- 메인 잔액 -->
  <div class="card hero">
    <div class="label">지금 쓸 수 있는 돈 (이월 포함)</div>
    <div class="balance" id="balance">0원</div>
    <div class="sub" id="todayLine"></div>
    <div class="bar"><span id="progress"></span></div>
    <div class="sub" id="usageLine"></div>
  </div>

  <div class="grid">
    <div class="stat"><div class="k">일일 예산</div><div class="v" id="sDaily">-</div></div>
    <div class="stat"><div class="k">이달 누적 예산</div><div class="v" id="sBudget">-</div></div>
    <div class="stat"><div class="k">이달 사용액</div><div class="v" id="sSpent">-</div></div>
  </div>

  <!-- 지출 입력 -->
  <div class="card">
    <label class="field">지출 기록</label>
    <div class="row">
      <input id="amtInput" type="number" inputmode="numeric" placeholder="금액" />
      <input id="dateInput" type="date" />
    </div>
    <input id="memoInput" type="text" placeholder="내용 (선택, 최대 20자)" maxlength="20" style="margin-top:10px;" />
    <div class="chips" id="catChips"></div>
    <button style="width:100%; margin-top:12px;" id="addBtn">＋ 지출 추가</button>
  </div>

  <!-- 분류별 지출 파이 (접이식, 지출 내역 바로 위) -->
  <div class="section-title">
    <button class="list-toggle" id="pieToggle" aria-expanded="true">
      <span class="caret">▾</span>
      <h2>분류별 지출</h2>
    </button>
  </div>
  <div class="card" id="pieCard">
    <div id="pieWrap" class="pie-wrap"></div>
  </div>

  <!-- 지출 목록 -->
  <div class="section-title">
    <button class="list-toggle" id="listToggle" aria-expanded="true">
      <span class="caret" id="listCaret">▾</span>
      <h2>지출 내역</h2>
      <span class="muted" id="listCount"></span>
    </button>
  </div>
  <div class="card" id="listCard"></div>

  <!-- 설정 다이얼로그 -->
  <dialog id="settingsDlg">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
      <h2 style="margin:0;">설정</h2>
      <button id="closeSet" aria-label="닫기" style="background:none; border:none; color:var(--sub); font-size:22px; line-height:1; padding:4px 8px; width:auto; cursor:pointer;">✕</button>
    </div>
    <label class="field">하루 사용 가능 금액 (일일 예산)</label>
    <input id="dailyInput" type="number" inputmode="numeric" placeholder="예: 20000" />
    <div class="row" style="margin-top:16px;">
      <button class="ghost" id="cancelSet">취소</button>
      <button id="saveSet">저장</button>
    </div>
    <hr style="border:none; border-top:1px solid var(--line); margin:20px 0;" />
    <label class="field">데이터 백업 · 기기 이전</label>
    <div class="row">
      <button class="ghost" id="exportBtn">내보내기</button>
      <button class="ghost" id="importBtn">가져오기</button>
    </div>
    <input id="importFile" type="file" accept="application/json,.json" style="display:none;" />
    <div class="muted" style="margin:8px 0 16px;">내보내기로 저장한 파일을 다른 기기(앱)에서 가져오기 하면 기록이 그대로 옮겨집니다.</div>
    <button class="danger" style="width:100%;" id="resetBtn">보는 달 기록 초기화</button>
    <div class="muted" style="margin-top:10px; text-align:center;">일일 예산은 보고 있는 달에 적용됩니다. 최근 3개월치만 저장되고, 오래된 달은 자동으로 삭제됩니다.</div>
  </dialog>

<script>
(function () {
  "use strict";

  const KEY = "wallet_carryover_v1";
  const MAX_MONTHS = 3; // localStorage에 보관할 최대 개월 수
  const DEFAULT_DAILY = 20000;
  // 색상: dataviz 다크 카테고리 팔레트 (검증 완료). 범례 직접 라벨로 식별.
  const CATS = [
    { id: "food",  label: "🍚 식비",       color: "#3987e5" },
    { id: "cafe",  label: "☕ 카페/간식",   color: "#199e70" },
    { id: "trans", label: "🚌 교통",       color: "#c98500" },
    { id: "shop",  label: "🛒 생활/쇼핑",   color: "#9085e9" },
    { id: "fun",   label: "🎮 여가",       color: "#e66767" },
    { id: "etc",   label: "📦 기타",       color: "#8a93a3" },
  ];
  const catMap = Object.fromEntries(CATS.map(c => [c.id, c.label]));

  // ---- 날짜 유틸 ----
  function curMonth() { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"); }
  function todayStr() { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
  function dayOfMonth() { return new Date().getDate(); }
  function daysInMonth(ym) { const [y, m] = ym.split("-").map(Number); return new Date(y, m, 0).getDate(); }
  function lastDayStr(ym) { return ym + "-" + String(daysInMonth(ym)).padStart(2, "0"); }
  function won(n) { return Math.round(n).toLocaleString("ko-KR") + "원"; }

  // ---- 상태 (다중 월) ----
  // state = { v:2, defaultDaily, months: { "YYYY-MM": {daily, expenses:[]} }, listOpen }
  function load() {
    let s;
    try { s = JSON.parse(localStorage.getItem(KEY)); } catch (e) { s = null; }
    if (!s || typeof s !== "object") s = {};

    // v1 마이그레이션: {daily, month, expenses, archive} → months 구조
    if (!s.months && (Array.isArray(s.expenses) || s.month)) {
      const months = {};
      if (s.month) months[s.month] = { daily: Number(s.daily) || DEFAULT_DAILY, expenses: Array.isArray(s.expenses) ? s.expenses : [] };
      s = { v: 2, defaultDaily: Number(s.daily) || DEFAULT_DAILY, months, listOpen: true };
    }
    if (!s.months || typeof s.months !== "object") s.months = {};
    if (typeof s.defaultDaily !== "number") s.defaultDaily = DEFAULT_DAILY;
    if (typeof s.listOpen !== "boolean") s.listOpen = true;
    if (typeof s.pieOpen !== "boolean") s.pieOpen = true;
    // 각 월 버킷 정합성
    Object.keys(s.months).forEach(k => {
      const b = s.months[k] || {};
      if (!Array.isArray(b.expenses)) b.expenses = [];
      if (typeof b.daily !== "number") b.daily = s.defaultDaily;
      s.months[k] = b;
    });
    return s;
  }
  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

  let state = load();
  let selectedCat = "food";
  let viewMonth = curMonth();

  // 저장된 월 키 (오름차순)
  function monthKeys() { return Object.keys(state.months).sort(); }
  // 가장 최근 월의 일일예산 (신규 월 기본값)
  function latestDaily() {
    const ks = monthKeys();
    return ks.length ? state.months[ks[ks.length - 1]].daily : state.defaultDaily;
  }
  function ensureMonth(ym) {
    if (!state.months[ym]) state.months[ym] = { daily: latestDaily(), expenses: [] };
    return state.months[ym];
  }
  // 3개월 초과 시 오래된 월부터 삭제 (현재 달은 항상 보존)
  function pruneMonths() {
    let ks = monthKeys();
    while (ks.length > MAX_MONTHS) {
      const oldest = ks[0];
      if (oldest === curMonth()) break;
      delete state.months[oldest];
      ks = monthKeys();
    }
  }

  // 현재 보는 월의 버킷 / 지출
  function bucket() { return ensureMonth(viewMonth); }
  function curExp() { return bucket().expenses; }

  // ---- 계산 (viewMonth 기준) ----
  function isCurrentView() { return viewMonth === curMonth(); }
  // 이월 핵심: 누적 예산 = 일일예산 × 지난 일수 (현재 달=오늘까지, 지난 달=월 전체)
  function daysElapsed() { return isCurrentView() ? dayOfMonth() : daysInMonth(viewMonth); }
  function dailyOf() { return bucket().daily; }
  function totalSpent() { return curExp().reduce((a, e) => a + e.amount, 0); }
  function todaySpent() { const t = todayStr(); return curExp().filter(e => e.date === t).reduce((a, e) => a + e.amount, 0); }
  function accBudget() { return dailyOf() * daysElapsed(); }
  function balance() { return accBudget() - totalSpent(); }

  // ---- 렌더 ----
  function render() {
    ensureMonth(curMonth());
    pruneMonths();
    ensureMonth(viewMonth);

    // 월 이동 바
    const [y, m] = viewMonth.split("-");
    document.getElementById("monthLabel").textContent =
      `${y}년 ${Number(m)}월` + (isCurrentView() ? ` · ${dayOfMonth()}일` : "");
    const ks = monthKeys();
    const idx = ks.indexOf(viewMonth);
    document.getElementById("prevMonth").disabled = idx <= 0;
    // 다음 달: 저장된 다음 월이 있고, 미래로는 못 감
    document.getElementById("nextMonth").disabled = idx < 0 || idx >= ks.length - 1 || viewMonth >= curMonth();

    const bal = balance();
    const balEl = document.getElementById("balance");
    balEl.textContent = won(bal);
    balEl.className = "balance " + (bal < 0 ? "neg" : "pos");

    document.querySelector(".hero .label").textContent =
      isCurrentView() ? "지금 쓸 수 있는 돈 (이월 포함)" : "그 달 최종 잔액 (이월 포함)";

    if (isCurrentView()) {
      const carryToToday = dailyOf() * (dayOfMonth() - 1) - (totalSpent() - todaySpent());
      const todayLeft = carryToToday + dailyOf() - todaySpent();
      document.getElementById("todayLine").textContent =
        `오늘 사용 ${won(todaySpent())} · 오늘 남은 몫 ${won(todayLeft)}`;
    } else {
      document.getElementById("todayLine").textContent =
        `${daysInMonth(viewMonth)}일 · 일일예산 ${won(dailyOf())}`;
    }

    const acc = accBudget();
    const usedPct = acc > 0 ? Math.min(100, (totalSpent() / acc) * 100) : 0;
    const p = document.getElementById("progress");
    p.style.width = usedPct + "%";
    p.style.background = usedPct >= 100 ? "var(--bad)" : usedPct >= 80 ? "var(--warn)" : "var(--accent)";
    document.getElementById("usageLine").textContent = `누적 예산의 ${Math.round(usedPct)}% 사용`;

    document.getElementById("sDaily").textContent = won(dailyOf());
    document.getElementById("sBudget").textContent = won(acc);
    document.getElementById("sSpent").textContent = won(totalSpent());

    renderPie();
    renderList();
    updateWidgetPayload();
  }

  // 안드로이드 홈 화면 위젯용 요약값 기록 (항상 '현재 달' 기준)
  function updateWidgetPayload() {
    try {
      const cm = curMonth();
      const b = state.months[cm] || { daily: state.defaultDaily, expenses: [] };
      const spent = b.expenses.reduce((a, e) => a + e.amount, 0);
      const t = todayStr();
      const todaySpent = b.expenses.filter(e => e.date === t).reduce((a, e) => a + e.amount, 0);
      const recent = b.expenses.slice().sort((a, x) => x.id - a.id).slice(0, 3).map(e => ({
        name: (e.memo && e.memo.trim()) || ((catMap[e.cat] || "📦 기타").split(" ").slice(1).join(" ")),
        amount: e.amount
      }));
      // 최근 7일 지출 (오래된→최신, 오늘 포함)
      const fmt = (d) => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
      const days7 = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - i);
        const ds = fmt(d);
        days7.push(b.expenses.filter(e => e.date === ds).reduce((a, e) => a + e.amount, 0));
      }
      // 분류별 합계 (CATS 순서 유지)
      const cats = CATS.map(c => ({ cat: c.id, amount: b.expenses.filter(e => e.cat === c.id).reduce((a, e) => a + e.amount, 0) }))
        .filter(x => x.amount > 0);
      localStorage.setItem("wallet_widget", JSON.stringify({ daily: b.daily, spent, month: cm, todaySpent, recent, days7, cats }));
    } catch (e) {}
  }

  // 위젯 ＋ 팝업으로 추가된 지출(대기열)을 가계부에 반영
  function flushPendingFromWidget() {
    try {
      if (!(window.WidgetBridge && window.WidgetBridge.getPending)) return;
      const raw = window.WidgetBridge.getPending();
      const arr = JSON.parse(raw || "[]");
      if (!Array.isArray(arr) || arr.length === 0) return;
      const cm = curMonth();
      const b = ensureMonth(cm);
      const existing = new Set(b.expenses.map(e => e.id));
      let added = 0;
      arr.forEach(it => {
        const id = Number(it.id) || (idSeq++);
        if (existing.has(id)) return;
        const amount = Math.round(Number(it.amount));
        if (!amount || amount <= 0) return;
        const date = (typeof it.date === "string" && it.date.slice(0, 7) === cm) ? it.date : todayStr();
        b.expenses.push({ id, date, amount, memo: (it.memo || "").toString(), cat: it.cat || "etc" });
        existing.add(id);
        added++;
      });
      window.WidgetBridge.clearPending();
      if (added > 0) {
        viewMonth = cm;          // 방금 추가된 지출이 보이도록 현재 달로 이동
        save();
        syncDateInput();
        render();
      }
    } catch (e) {}
  }

  function goMonth(delta) {
    const ks = monthKeys();
    const idx = ks.indexOf(viewMonth);
    const ni = idx + delta;
    if (ni < 0 || ni >= ks.length) return;
    viewMonth = ks[ni];
    syncDateInput();
    render();
  }

  function renderPie() {
    const wrap = document.getElementById("pieWrap");

    // 접기/펼치기 상태 반영
    document.getElementById("pieToggle").setAttribute("aria-expanded", String(state.pieOpen));
    document.getElementById("pieCard").classList.toggle("collapsed", !state.pieOpen);
    if (!state.pieOpen) { wrap.innerHTML = ""; return; }

    // 분류별 합계
    const sums = {};
    CATS.forEach(c => { sums[c.id] = 0; });
    curExp().forEach(e => { sums[e.cat] = (sums[e.cat] || 0) + e.amount; });
    const total = Object.values(sums).reduce((a, b) => a + b, 0);

    if (total === 0) {
      wrap.className = "pie-wrap";
      wrap.innerHTML = '<div class="empty" style="width:100%;">지출이 없어요.<br>기록하면 분류별 비중이 표시됩니다.</div>';
      return;
    }

    const parts = CATS
      .map(c => ({ c, amt: sums[c.id] }))
      .filter(p => p.amt > 0)
      .sort((a, b) => b.amt - a.amt);

    const size = 132, r = 52, sw = 22, cx = size / 2, cy = size / 2;
    const C = 2 * Math.PI * r;
    const gap = parts.length > 1 ? 3 : 0; // 세그먼트 사이 간극(px)
    let acc = 0;
    let segs = "";
    parts.forEach((p, i) => {
      const frac = p.amt / total;
      const arc = frac * C;
      const vis = Math.max(arc - gap, 0.5);
      segs += `<circle class="pie-seg" data-cat="${p.c.id}" cx="${cx}" cy="${cy}" r="${r}"
        fill="none" stroke="${p.c.color}" stroke-width="${sw}"
        stroke-dasharray="${vis.toFixed(2)} ${(C - vis).toFixed(2)}"
        stroke-dashoffset="${(-acc * C).toFixed(2)}">
        <title>${escapeHtml(p.c.label)} ${won(p.amt)} (${Math.round(frac * 100)}%)</title>
      </circle>`;
      acc += frac;
    });

    const svg = `<svg class="pie-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"
      role="img" aria-label="분류별 지출 비중">
      <g transform="rotate(-90 ${cx} ${cy})">${segs}</g>
      <text class="pie-center-total" x="${cx}" y="${cy - 1}" text-anchor="middle">${won(total)}</text>
      <text class="pie-center-label" x="${cx}" y="${cy + 13}" text-anchor="middle">총 지출</text>
    </svg>`;

    let legend = '<div class="legend">';
    parts.forEach(p => {
      const pct = Math.round((p.amt / total) * 100);
      legend += `<div class="legend-row" data-cat="${p.c.id}">
        <span class="sw" style="background:${p.c.color}"></span>
        <span class="nm">${escapeHtml(p.c.label)}</span>
        <span class="vl">${won(p.amt)}</span>
        <span class="pc">${pct}%</span>
      </div>`;
    });
    legend += "</div>";

    wrap.className = "pie-wrap";
    wrap.innerHTML = svg + legend;

    // 호버 연동: 세그먼트/범례 서로 강조
    const setHot = (cat) => {
      wrap.classList.toggle("dim", !!cat);
      wrap.querySelectorAll(".pie-seg").forEach(s => s.classList.toggle("hot", s.dataset.cat === cat));
      wrap.querySelectorAll(".legend-row").forEach(row => {
        row.style.background = row.dataset.cat === cat ? "var(--card2)" : "";
      });
    };
    wrap.querySelectorAll(".pie-seg, .legend-row").forEach(el => {
      el.addEventListener("mouseenter", () => setHot(el.dataset.cat));
      el.addEventListener("mouseleave", () => setHot(null));
    });
  }

  function renderList() {
    const card = document.getElementById("listCard");
    const exp = curExp();

    // 접기/펼치기 상태 반영
    const toggle = document.getElementById("listToggle");
    toggle.setAttribute("aria-expanded", String(state.listOpen));
    document.getElementById("listCount").textContent = exp.length ? `(${exp.length}건)` : "";
    card.classList.toggle("collapsed", !state.listOpen);
    card.classList.toggle("scrollable", state.listOpen && exp.length > 0);
    if (!state.listOpen) { card.innerHTML = ""; return; }

    if (exp.length === 0) {
      card.innerHTML = '<div class="empty">기록이 없어요.<br>지출을 추가해 보세요.</div>';
      return;
    }
    // 날짜별 그룹 (최신순)
    const byDate = {};
    exp.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });
    const dates = Object.keys(byDate).sort().reverse();

    let html = "";
    dates.forEach(d => {
      const items = byDate[d].slice().sort((a, b) => b.id - a.id);
      const daySum = items.reduce((a, e) => a + e.amount, 0);
      const label = d === todayStr() ? "오늘" : `${Number(d.split("-")[1])}/${Number(d.split("-")[2])}`;
      html += `<div class="day-head">${label} · ${won(daySum)}</div>`;
      items.forEach(e => {
        const cat = catMap[e.cat] || "📦 기타";
        html += `<div class="exp">
          <div class="icon">${cat.split(" ")[0]}</div>
          <div class="info">
            <div class="m">${escapeHtml(e.memo) || cat.split(" ").slice(1).join(" ")}</div>
            <div class="d">${cat.split(" ").slice(1).join(" ")}</div>
          </div>
          <div class="amt">-${won(e.amount)}</div>
          <button class="del" data-id="${e.id}">✕</button>
        </div>`;
      });
    });
    card.innerHTML = html;
    card.querySelectorAll(".del").forEach(b => {
      b.onclick = () => { removeExpense(Number(b.dataset.id)); };
    });
  }

  function escapeHtml(s) { return String(s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

  // ---- 액션 ----
  let idSeq = Date.now();
  // 보는 달에 맞춰 날짜 입력 기본값 설정 (현재 달=오늘, 지난 달=말일)
  function syncDateInput() {
    const el = document.getElementById("dateInput");
    el.value = isCurrentView() ? todayStr() : lastDayStr(viewMonth);
    el.min = viewMonth + "-01";
    el.max = lastDayStr(viewMonth);
  }
  function addExpense() {
    const amtEl = document.getElementById("amtInput");
    const memoEl = document.getElementById("memoInput");
    const dateEl = document.getElementById("dateInput");
    const amount = Math.round(Number(amtEl.value));
    if (!amount || amount <= 0) { amtEl.focus(); return; }
    let date = dateEl.value || (isCurrentView() ? todayStr() : lastDayStr(viewMonth));
    // 보고 있는 달의 날짜만 허용
    if (date.slice(0, 7) !== viewMonth) {
      alert(viewMonth + " 안의 날짜만 기록할 수 있어요.");
      dateEl.focus();
      return;
    }
    curExp().push({ id: idSeq++, date, amount, memo: memoEl.value.trim().slice(0, 20), cat: selectedCat });
    save();
    amtEl.value = ""; memoEl.value = "";
    syncDateInput();
    render();
    // 포커스를 풀어 키보드가 다시 올라오지 않도록 (금액칸으로 넘기지 않음)
    if (amtEl.blur) amtEl.blur();
    if (memoEl.blur) memoEl.blur();
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
  }
  function removeExpense(id) {
    const b = bucket();
    const e = b.expenses.find(x => x.id === id);
    if (!e) return;
    const name = (e.memo && e.memo.trim()) || (catMap[e.cat] || "지출").split(" ").slice(1).join(" ");
    if (!confirm(`'${name}' ${won(e.amount)} 기록을 삭제할까요?`)) return;
    b.expenses = b.expenses.filter(x => x.id !== id);
    save(); render();
  }

  // ---- 카테고리 칩 ----
  function renderChips() {
    const box = document.getElementById("catChips");
    box.innerHTML = "";
    CATS.forEach(c => {
      const el = document.createElement("div");
      el.className = "chip" + (c.id === selectedCat ? " on" : "");
      el.textContent = c.label;
      el.onclick = () => { selectedCat = c.id; renderChips(); };
      box.appendChild(el);
    });
  }

  // ---- 설정 다이얼로그 ----
  const dlg = document.getElementById("settingsDlg");
  document.getElementById("settingsBtn").onclick = () => {
    document.getElementById("dailyInput").value = dailyOf();
    dlg.showModal();
  };
  document.getElementById("cancelSet").onclick = () => dlg.close();
  document.getElementById("closeSet").onclick = () => dlg.close();
  document.getElementById("saveSet").onclick = () => {
    const v = Math.round(Number(document.getElementById("dailyInput").value));
    if (v > 0) {
      bucket().daily = v;          // 보고 있는 달에 적용
      state.defaultDaily = v;      // 이후 새 달의 기본값으로도 반영
      save(); render();
    }
    dlg.close();
  };
  document.getElementById("resetBtn").onclick = () => {
    if (confirm(viewMonth + " 지출 기록을 모두 지울까요?")) {
      bucket().expenses = []; save(); render(); dlg.close();
    }
  };

  // ---- 데이터 내보내기 / 가져오기 (백업·기기 이전) ----
  function pad2(n) { return String(n).padStart(2, "0"); }
  document.getElementById("exportBtn").onclick = () => {
    try {
      const payload = { app: "carryover-wallet", exportedAt: new Date().toISOString(), data: state };
      const text = JSON.stringify(payload, null, 2);
      const d = new Date();
      const fname = `wallet-backup-${d.getFullYear()}${pad2(d.getMonth() + 1)}${pad2(d.getDate())}.json`;
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = fname;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).catch(() => {});
    } catch (e) { alert("내보내기 실패: " + e.message); }
  };

  document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
  document.getElementById("importFile").addEventListener("change", (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        let obj = JSON.parse(String(reader.result));
        // {app, data:{...}} 형태이면 data만, 아니면 그대로(직접 state 백업) 사용
        const incoming = (obj && obj.data && typeof obj.data === "object") ? obj.data : obj;
        if (!incoming || (typeof incoming !== "object")) throw new Error("형식이 올바르지 않습니다");
        if (!incoming.months && !incoming.expenses && !incoming.month) throw new Error("가계부 데이터가 아닙니다");
        if (!confirm("현재 이 기기의 기록을 가져온 데이터로 덮어쓸까요?")) { ev.target.value = ""; return; }
        localStorage.setItem(KEY, JSON.stringify(incoming));
        state = load();                 // 마이그레이션/정합성 검사 재사용
        ensureMonth(curMonth());
        pruneMonths();
        viewMonth = curMonth();
        save();
        syncDateInput();
        render();
        dlg.close();
        alert("가져오기 완료!");
      } catch (e) {
        alert("가져오기 실패: " + e.message);
      }
      ev.target.value = "";
    };
    reader.readAsText(file);
  });

  // ---- 이벤트 ----
  document.getElementById("addBtn").onclick = addExpense;
  document.getElementById("amtInput").addEventListener("keydown", e => { if (e.key === "Enter") addExpense(); });
  document.getElementById("memoInput").addEventListener("keydown", e => { if (e.key === "Enter") addExpense(); });

  // 월 이동
  document.getElementById("prevMonth").onclick = () => goMonth(-1);
  document.getElementById("nextMonth").onclick = () => goMonth(1);

  // 지출 내역 접기/펼치기
  document.getElementById("listToggle").onclick = () => {
    state.listOpen = !state.listOpen;
    save(); renderList();
  };

  // 분류별 지출 접기/펼치기
  document.getElementById("pieToggle").onclick = () => {
    state.pieOpen = !state.pieOpen;
    save(); renderPie();
  };

  // ---- PWA: 설치 안내 & 서비스워커 ----
  let deferredPrompt = null;
  const installBar = document.getElementById("installBar");
  const installBtn = document.getElementById("installBtn");
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBar) installBar.style.display = "flex";
  });
  if (installBtn) {
    installBtn.onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBar.style.display = "none";
    };
  }
  window.addEventListener("appinstalled", () => { if (installBar) installBar.style.display = "none"; });

  // 네이티브 앱(Capacitor WebView)에서는 서비스워커 불필요 → 등록 생략
  const isNativeApp = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
  if (!isNativeApp && "serviceWorker" in navigator) {
    let reloaded = false;
    // 새 서비스워커가 제어를 넘겨받으면 한 번 새로고침 → 최신 버전 즉시 반영
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (reloaded) return;
      reloaded = true;
      window.location.reload();
    });
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").then((reg) => {
        // 주기적으로 업데이트 확인
        reg.update();
      }).catch(() => {});
    });
  }

  // 위젯 팝업으로 추가된 지출을 앱이 보일 때마다 반영
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") flushPendingFromWidget();
  });
  window.addEventListener("focus", flushPendingFromWidget);

  // 첫 실행
  ensureMonth(curMonth());
  pruneMonths();
  save();
  syncDateInput();
  renderChips();
  render();
  flushPendingFromWidget();
})();
</script>
</body>
</html>
