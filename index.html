<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>이월 가계부</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0f1115" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<!-- iOS 홈 화면 앱 -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="이월가계부" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card2: #22262f;
    --line: #2c313c;
    --txt: #e8eaed;
    --sub: #9aa0ac;
    --accent: #4f8cff;
    --good: #37d67a;
    --bad: #ff5c6c;
    --warn: #ffb020;
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg);
    color: var(--txt);
    padding: 16px 14px 60px;
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.4;
  }
  h1 { font-size: 20px; margin: 4px 0 2px; }
  .muted { color: var(--sub); font-size: 13px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    margin-top: 14px;
  }

  /* 메인 잔액 카드 */
  .hero { text-align: center; padding: 24px 18px; }
  .hero .label { color: var(--sub); font-size: 14px; }
  .hero .balance { font-size: 42px; font-weight: 800; margin: 6px 0 2px; letter-spacing: -1px; }
  .hero .balance.neg { color: var(--bad); }
  .hero .balance.pos { color: var(--good); }
  .hero .sub { font-size: 13px; color: var(--sub); }
  .bar { height: 8px; background: var(--card2); border-radius: 99px; margin: 16px 0 6px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; }

  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 14px; }
  .stat { background: var(--card2); border-radius: 12px; padding: 12px 10px; text-align: center; }
  .stat .k { font-size: 11px; color: var(--sub); }
  .stat .v { font-size: 15px; font-weight: 700; margin-top: 4px; }

  label.field { display: block; font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  input, select, button { font-family: inherit; font-size: 16px; }
  input, select {
    width: 100%; padding: 12px 14px; background: var(--card2); border: 1px solid var(--line);
    color: var(--txt); border-radius: 12px; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  button {
    cursor: pointer; border: none; border-radius: 12px; padding: 13px; font-weight: 700;
    background: var(--accent); color: #fff; transition: filter .15s;
  }
  button:active { filter: brightness(.9); }
  button.ghost { background: var(--card2); color: var(--txt); border: 1px solid var(--line); }
  button.danger { background: transparent; color: var(--bad); border: 1px solid var(--line); }

  .section-title { display: flex; justify-content: space-between; align-items: center; margin: 22px 4px 8px; }
  .section-title h2 { font-size: 15px; margin: 0; }

  .exp { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid var(--line); }
  .exp:last-child { border-bottom: none; }
  .exp .icon { width: 38px; height: 38px; border-radius: 10px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex: none; }
  .exp .info { flex: 1; min-width: 0; }
  .exp .info .m { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exp .info .d { font-size: 12px; color: var(--sub); }
  .exp .amt { font-weight: 700; font-size: 15px; }
  .exp .del { background: none; border: none; color: var(--sub); font-size: 18px; padding: 4px 8px; }
  .day-head { font-size: 12px; color: var(--sub); margin: 16px 4px 2px; font-weight: 700; }
  .empty { text-align: center; color: var(--sub); padding: 30px 10px; font-size: 14px; }

  dialog {
    border: 1px solid var(--line); background: var(--card); color: var(--txt);
    border-radius: var(--radius); padding: 20px; width: 90%; max-width: 400px;
  }
  dialog::backdrop { background: rgba(0,0,0,.6); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .chip { padding: 8px 12px; border-radius: 99px; background: var(--card2); border: 1px solid var(--line); font-size: 14px; cursor: pointer; }
  .chip.on { background: var(--accent); border-color: var(--accent); color:#fff; }
</style>
</head>
<body>

  <h1>💰 이월 가계부</h1>
  <div class="muted" id="monthLabel"></div>

  <div id="installBar" style="display:none; align-items:center; gap:10px; margin-top:12px; padding:12px 14px; background:var(--card2); border:1px solid var(--line); border-radius:12px;">
    <span style="flex:1; font-size:13px;">홈 화면에 앱으로 설치할 수 있어요.</span>
    <button id="installBtn" style="padding:8px 14px; font-size:13px; flex:none;">설치</button>
  </div>

  <!-- 메인 잔액 -->
  <div class="card hero">
    <div class="label">지금 쓸 수 있는 돈 (이월 포함)</div>
    <div class="balance" id="balance">0원</div>
    <div class="sub" id="todayLine"></div>
    <div class="bar"><span id="progress"></span></div>
    <div class="sub" id="usageLine"></div>
  </div>

  <div class="grid">
    <div class="stat"><div class="k">일일 예산</div><div class="v" id="sDaily">-</div></div>
    <div class="stat"><div class="k">이달 누적 예산</div><div class="v" id="sBudget">-</div></div>
    <div class="stat"><div class="k">이달 사용액</div><div class="v" id="sSpent">-</div></div>
  </div>

  <!-- 지출 입력 -->
  <div class="card">
    <label class="field">지출 기록</label>
    <div class="row">
      <input id="amtInput" type="number" inputmode="numeric" placeholder="금액" />
      <input id="dateInput" type="date" />
    </div>
    <input id="memoInput" type="text" placeholder="내용 (선택)" style="margin-top:10px;" />
    <div class="chips" id="catChips"></div>
    <button style="width:100%; margin-top:12px;" id="addBtn">＋ 지출 추가</button>
  </div>

  <!-- 지출 목록 -->
  <div class="section-title">
    <h2>이번 달 지출 내역</h2>
    <button class="ghost" style="padding:8px 12px; font-size:13px;" id="settingsBtn">⚙ 설정</button>
  </div>
  <div class="card" id="listCard"></div>

  <!-- 설정 다이얼로그 -->
  <dialog id="settingsDlg">
    <h2 style="margin-top:0;">설정</h2>
    <label class="field">하루 사용 가능 금액 (일일 예산)</label>
    <input id="dailyInput" type="number" inputmode="numeric" placeholder="예: 20000" />
    <div class="row" style="margin-top:16px;">
      <button class="ghost" id="cancelSet">취소</button>
      <button id="saveSet">저장</button>
    </div>
    <hr style="border:none; border-top:1px solid var(--line); margin:20px 0;" />
    <button class="danger" style="width:100%;" id="resetBtn">이번 달 기록 초기화</button>
    <div class="muted" style="margin-top:10px; text-align:center;">달이 바뀌면 자동으로 초기화되고 새로 시작합니다.</div>
  </dialog>

<script>
(function () {
  "use strict";

  const KEY = "wallet_carryover_v1";
  const CATS = [
    { id: "food",  label: "🍚 식비" },
    { id: "cafe",  label: "☕ 카페/간식" },
    { id: "trans", label: "🚌 교통" },
    { id: "shop",  label: "🛒 생활/쇼핑" },
    { id: "fun",   label: "🎮 여가" },
    { id: "etc",   label: "📦 기타" },
  ];
  const catMap = Object.fromEntries(CATS.map(c => [c.id, c.label]));

  // ---- 상태 ----
  function load() {
    let s;
    try { s = JSON.parse(localStorage.getItem(KEY)); } catch (e) { s = null; }
    if (!s || typeof s !== "object") {
      s = { daily: 20000, month: curMonth(), expenses: [], archive: [] };
    }
    if (!Array.isArray(s.expenses)) s.expenses = [];
    if (!Array.isArray(s.archive)) s.archive = [];
    if (typeof s.daily !== "number") s.daily = 20000;
    return s;
  }
  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

  let state = load();
  let selectedCat = "food";

  // ---- 날짜 유틸 ----
  function curMonth() { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"); }
  function todayStr() { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
  function dayOfMonth() { return new Date().getDate(); }
  function daysInMonth(ym) { const [y, m] = ym.split("-").map(Number); return new Date(y, m, 0).getDate(); }
  function won(n) { return Math.round(n).toLocaleString("ko-KR") + "원"; }

  // ---- 월 자동 초기화 ----
  function checkMonthReset() {
    const now = curMonth();
    if (state.month !== now) {
      // 지난 달 요약을 보관함에 저장
      const spent = state.expenses.reduce((a, e) => a + e.amount, 0);
      state.archive.unshift({ month: state.month, daily: state.daily, spent: spent, count: state.expenses.length });
      state.archive = state.archive.slice(0, 24);
      state.expenses = [];
      state.month = now;
      save();
    }
  }

  // ---- 계산 ----
  function totalSpent() { return state.expenses.reduce((a, e) => a + e.amount, 0); }
  function todaySpent() { const t = todayStr(); return state.expenses.filter(e => e.date === t).reduce((a, e) => a + e.amount, 0); }
  // 이월 핵심: 오늘까지 누적 예산 = 일일예산 × 이번 달 지난 일수
  function accBudget() { return state.daily * dayOfMonth(); }
  function balance() { return accBudget() - totalSpent(); }

  // ---- 렌더 ----
  function render() {
    checkMonthReset();

    const bal = balance();
    const balEl = document.getElementById("balance");
    balEl.textContent = won(bal);
    balEl.className = "balance " + (bal < 0 ? "neg" : "pos");

    const [y, m] = state.month.split("-");
    document.getElementById("monthLabel").textContent =
      `${y}년 ${Number(m)}월 · ${dayOfMonth()}일 / ${daysInMonth(state.month)}일`;

    // 오늘 몫: 오늘 남은 = 어제까지 이월분 + 오늘 예산 - 오늘 사용
    const carryToToday = state.daily * (dayOfMonth() - 1) - (totalSpent() - todaySpent());
    const todayLeft = carryToToday + state.daily - todaySpent();
    document.getElementById("todayLine").textContent =
      `오늘 사용 ${won(todaySpent())} · 오늘 남은 몫 ${won(todayLeft)}`;

    // 진행 바 (누적 예산 대비 사용률)
    const acc = accBudget();
    const usedPct = acc > 0 ? Math.min(100, (totalSpent() / acc) * 100) : 0;
    const p = document.getElementById("progress");
    p.style.width = usedPct + "%";
    p.style.background = usedPct >= 100 ? "var(--bad)" : usedPct >= 80 ? "var(--warn)" : "var(--accent)";
    document.getElementById("usageLine").textContent =
      `누적 예산의 ${Math.round(usedPct)}% 사용`;

    document.getElementById("sDaily").textContent = won(state.daily);
    document.getElementById("sBudget").textContent = won(acc);
    document.getElementById("sSpent").textContent = won(totalSpent());

    renderList();
  }

  function renderList() {
    const card = document.getElementById("listCard");
    if (state.expenses.length === 0) {
      card.innerHTML = '<div class="empty">아직 기록이 없어요.<br>오늘 지출을 추가해 보세요.</div>';
      return;
    }
    // 날짜별 그룹 (최신순)
    const byDate = {};
    state.expenses.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });
    const dates = Object.keys(byDate).sort().reverse();

    let html = "";
    dates.forEach(d => {
      const items = byDate[d].slice().sort((a, b) => b.id - a.id);
      const daySum = items.reduce((a, e) => a + e.amount, 0);
      const label = d === todayStr() ? "오늘" : `${Number(d.split("-")[1])}/${Number(d.split("-")[2])}`;
      html += `<div class="day-head">${label} · ${won(daySum)}</div>`;
      items.forEach(e => {
        const cat = catMap[e.cat] || "📦 기타";
        html += `<div class="exp">
          <div class="icon">${cat.split(" ")[0]}</div>
          <div class="info">
            <div class="m">${escapeHtml(e.memo) || cat.split(" ").slice(1).join(" ")}</div>
            <div class="d">${cat.split(" ").slice(1).join(" ")}</div>
          </div>
          <div class="amt">-${won(e.amount)}</div>
          <button class="del" data-id="${e.id}">✕</button>
        </div>`;
      });
    });
    card.innerHTML = html;
    card.querySelectorAll(".del").forEach(b => {
      b.onclick = () => { removeExpense(Number(b.dataset.id)); };
    });
  }

  function escapeHtml(s) { return String(s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

  // ---- 액션 ----
  let idSeq = Date.now();
  function addExpense() {
    const amtEl = document.getElementById("amtInput");
    const memoEl = document.getElementById("memoInput");
    const dateEl = document.getElementById("dateInput");
    const amount = Math.round(Number(amtEl.value));
    if (!amount || amount <= 0) { amtEl.focus(); return; }
    let date = dateEl.value || todayStr();
    // 다른 달의 기록은 저장하지 않음 (이번 달만 관리)
    if (date.slice(0, 7) !== state.month) {
      alert("이번 달(" + state.month + ") 날짜만 기록할 수 있어요.");
      dateEl.focus();
      return;
    }
    state.expenses.push({ id: idSeq++, date, amount, memo: memoEl.value.trim(), cat: selectedCat });
    save();
    amtEl.value = ""; memoEl.value = "";
    dateEl.value = todayStr();
    render();
    amtEl.focus();
  }
  function removeExpense(id) {
    state.expenses = state.expenses.filter(e => e.id !== id);
    save(); render();
  }

  // ---- 카테고리 칩 ----
  function renderChips() {
    const box = document.getElementById("catChips");
    box.innerHTML = "";
    CATS.forEach(c => {
      const el = document.createElement("div");
      el.className = "chip" + (c.id === selectedCat ? " on" : "");
      el.textContent = c.label;
      el.onclick = () => { selectedCat = c.id; renderChips(); };
      box.appendChild(el);
    });
  }

  // ---- 설정 다이얼로그 ----
  const dlg = document.getElementById("settingsDlg");
  document.getElementById("settingsBtn").onclick = () => {
    document.getElementById("dailyInput").value = state.daily;
    dlg.showModal();
  };
  document.getElementById("cancelSet").onclick = () => dlg.close();
  document.getElementById("saveSet").onclick = () => {
    const v = Math.round(Number(document.getElementById("dailyInput").value));
    if (v > 0) { state.daily = v; save(); render(); }
    dlg.close();
  };
  document.getElementById("resetBtn").onclick = () => {
    if (confirm("이번 달 지출 기록을 모두 지울까요?")) {
      state.expenses = []; save(); render(); dlg.close();
    }
  };

  // ---- 이벤트 ----
  document.getElementById("addBtn").onclick = addExpense;
  document.getElementById("amtInput").addEventListener("keydown", e => { if (e.key === "Enter") addExpense(); });
  document.getElementById("memoInput").addEventListener("keydown", e => { if (e.key === "Enter") addExpense(); });

  // ---- PWA: 설치 안내 & 서비스워커 ----
  let deferredPrompt = null;
  const installBar = document.getElementById("installBar");
  const installBtn = document.getElementById("installBtn");
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBar) installBar.style.display = "flex";
  });
  if (installBtn) {
    installBtn.onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBar.style.display = "none";
    };
  }
  window.addEventListener("appinstalled", () => { if (installBar) installBar.style.display = "none"; });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }

  // 첫 실행
  document.getElementById("dateInput").value = todayStr();
  renderChips();
  render();
})();
</script>
</body>
</html>
